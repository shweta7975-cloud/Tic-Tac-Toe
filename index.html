<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="start-screen" id="start-screen">
      <h1>Tic Tac Toe</h1>
      <p class="intro-text">Choose a mode to begin:</p>
      <div class="start-actions">
        <button type="button" data-mode="pvp" class="start-button">Player vs Player</button>
        <button type="button" data-mode="pvc" class="start-button">Player vs Computer</button>
      </div>
    </section>

    <section class="game-panel hidden" id="game-panel">
      <h1>Tic Tac Toe</h1>
      <div class="roles" id="roles"></div>
      <div class="status" id="status">Player O's turn</div>
      <div class="board-wrapper">
        <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
        <div class="winning-line" id="winning-line"></div>
      </div>
      <div class="controls">
        <button id="back-to-menu">Back</button>
        <button id="restart">Restart</button>
        <button id="exit-game">Exit</button>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
